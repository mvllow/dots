# Theme
include themes/rose-pine.conf

# General
allow_remote_control yes
copy_on_select       yes
enable_audio_bell    no

# Font
adjust_line_height 160%
font_family        SF Mono
font_size          13.5

# Cursor
cursor_blink_interval 0
cursor_shape          block
mouse_hide_wait       -1
shell_integration     no-cursor

# Interface
# Setting a minimum background opacity of 0.989 hides window border on macOS
background_opacity      0.98
hide_window_decorations titlebar-only
active_tab_font_style   normal
tab_bar_style           separator
tab_separator           ' | '
window_padding_width    10

# Layout
enabled_layouts tall,stack
# enabled_layouts fat:bias=90;full_size=1;mirrored=false,stack
# ┌──────────────────────────────┐
# │                              │
# │                              │
# │                              │
# │                              │
# ├─────────┬──────────┬─────────┤
# │         │          │         │
# └─────────┴──────────┴─────────┘

# Keymaps
action_alias launch_tab launch --cwd=current --type=tab
action_alias launch_overlay launch --cwd=current --type=overlay

map cmd+g launch_overlay lazygit --use-config-dir $HOME/.config/lazygit
map cmd+b launch_tab --location=before --keep-focus --title=server $SHELL -c "pnpm dev --open"

map cmd+f       toggle_layout stack
map cmd+,       set_tab_title
map cmd+t       new_tab_with_cwd
map cmd+enter   new_window_with_cwd
map cmd+[       previous_window
map cmd+]       next_window
map cmd+u       kitten unicode_input
map cmd+d       detach_window new-tab
map cmd+w       close_window
map cmd+q       quit
map cmd+up      move_window up
map cmd+left    move_window left
map cmd+right   move_window right
map cmd+down    move_window down
