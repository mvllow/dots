adjust_line_height 160%
font_family sf mono medium
bold_font sf mono bold
italic_font cartograph cf regular italic
bold_italic_font cartograph cf demi bold italic
font_size 13

bell_on_tab no
cursor_blink_interval 0
editor '/opt/homebrew/bin/nvim'
enable_audio_bell no
enabled_layouts tall
hide_window_decorations titlebar-only
background_opacity 0.98

## Hide mouse after typing
## Negative value hides immediately, 0 disables hiding
mouse_hide_wait -1

tab_bar_style separator
tab_separator '  |  '
window_border_width 0
window_padding_width 10

map cmd+[ previous_window
map cmd+] next_window
map cmd+t new_tab_with_cwd
map cmd+enter new_window_with_cwd
map cmd+w close_window
map shift+up move_window up
map shift+left move_window left
map shift+right move_window right
map shift+down move_window down

# BEGIN_KITTY_THEME
# Rosé Pine Dawn
include current-theme.conf
# END_KITTY_THEME
