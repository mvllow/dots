## Font: SF Mono
adjust_line_height 115%
font_family sf mono medium
bold_font sf mono bold
font_size 12.5

## Font: Cartograph CF
# adjust_line_height 100%
# font_family cartograph cf
# bold_font cartograph cf bold
# font_size 13

bell_on_tab no
cursor_blink_interval 0
editor '/opt/homebrew/bin/nvim'
enable_audio_bell no
enabled_layouts tall
hide_window_decorations titlebar-only

## Hide mouse after typing
## Negative value hides immediately, 0 disables hiding
mouse_hide_wait -1

tab_bar_style separator
tab_separator '  |  '
window_border_width 0
window_padding_width 10

## Conflicts with typing accents, eg. when typing "Rosé Pine"
# macos_option_as_alt yes

map cmd+[ previous_window
map cmd+] next_window
map cmd+t new_tab_with_cwd
map cmd+enter new_window_with_cwd
map cmd+w close_window


# BEGIN_KITTY_THEME
# Rosé Pine
include current-theme.conf
# END_KITTY_THEME
