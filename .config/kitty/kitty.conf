# Theme
include themes/rose-pine.conf

# General
allow_remote_control yes
copy_on_select       yes
enable_audio_bell    no

# Font
# include font-cartograph-cf.conf
include font-ibm-plex-mono.conf
# include font-sf-mono.conf

# Cursor
cursor_blink_interval 0
cursor_shape          block
mouse_hide_wait       -1
shell_integration     no-cursor

# Interface
background_opacity      0.989
hide_window_decorations titlebar-only
tab_bar_style           separator
tab_separator           ' | '
window_padding_width    10

# Layout
# enabled_layouts fat,stack
enabled_layouts fat:bias=90;full_size=1;mirrored=false,stack
# ┌──────────────────────────────┐
# │                              │
# │                              │
# │                              │
# │                              │
# ├─────────┬──────────┬─────────┤
# │         │          │         │
# └─────────┴──────────┴─────────┘

# Keymaps
include keymaps.conf
# include keymaps-tmux.conf
